<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a2540" />
  <title>Happy Birthday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">A little surprise, every day</p>
      <h1 class="title">Happy Birthday</h1>
      <p class="subtitle">Open one present each day, from Wednesday to Sunday. Every gift comes with a hint.</p>

      <div class="countdown" id="countdown" aria-live="polite">
        <div class="countdown-label" id="countdownLabel">Next present unlocks in</div>
        <div class="countdown-clock" id="countdownClock">
          <div class="unit"><span class="num" id="cdDays">0</span><span class="cap">days</span></div>
          <div class="unit"><span class="num" id="cdHours">0</span><span class="cap">hrs</span></div>
          <div class="unit"><span class="num" id="cdMins">0</span><span class="cap">min</span></div>
          <div class="unit"><span class="num" id="cdSecs">0</span><span class="cap">sec</span></div>
        </div>
      </div>
    </header>

    <main class="grid" id="grid" aria-label="Daily presents"></main>

    <footer class="footer">
      <p>Made with care</p>
    </footer>
  </div>

  <!-- Reveal overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="reveal-card" role="dialog" aria-modal="true" aria-labelledby="revealGift">
      <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
      <p class="reveal-day" id="revealDay">Wednesday</p>
      <div class="reveal-gift-wrap">
        <h2 class="reveal-gift" id="revealGift">Gift</h2>
      </div>
      <div class="reveal-hint">
        <p class="hint-label">Your hint</p>
        <div class="hint-image" id="hintImage"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
